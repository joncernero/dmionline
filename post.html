<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading... | Dragonfly Mission International</title>
  <meta name="description" content="">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="blog">

  <nav id="site-nav"></nav>

  <main class="post-page" id="main-content">
    <div class="post-container">
      <a href="blog.html" class="back-link">&#8592; All Posts</a>
      <div id="post-category" class="post-meta"></div>
      <h1 id="post-title"></h1>
      <div id="post-date" class="post-date-read"></div>
      <div id="post-body" class="post-body"></div>
      <div class="post-footer">
        <a href="blog.html" class="back-link">&#8592; All Posts</a>
      </div>
    </div>
  </main>

  <footer id="site-footer"></footer>

  <script src="nav.js"></script>
  <script src="posts.js"></script>
  <script>
    var slug = new URLSearchParams(window.location.search).get('slug');
    var post = POSTS.find(function (p) { return p.slug === slug; });

    if (!post) {
      document.title = 'Post Not Found | Dragonfly Mission International';
      document.getElementById('post-title').textContent = 'Post not found';
      document.getElementById('post-body').innerHTML =
        '<p>Sorry, we couldn\'t find that post. <a href="blog.html" style="color:rgba(255,255,255,0.85);text-decoration:underline;">Return to the blog.</a></p>';
    } else {
      // Update page title and meta
      document.title = post.title + ' | Dragonfly Mission International';
      var metaDesc = document.querySelector('meta[name="description"]');
      if (metaDesc) metaDesc.setAttribute('content', post.excerpt);

      // Estimated reading time
      var wordCount = post.paragraphs.join(' ').split(/\s+/).length;
      var mins = Math.max(1, Math.round(wordCount / 200));

      // Render
      document.getElementById('post-category').textContent = post.category;
      document.getElementById('post-title').textContent = post.title;
      document.getElementById('post-date').textContent = post.date + ' · ' + mins + ' min read';
      document.getElementById('post-body').innerHTML =
        post.paragraphs.map(function (p) { return '<p>' + p + '</p>'; }).join('');
    }
  </script>
</body>
</html>
